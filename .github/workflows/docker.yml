name: Build and push Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: docker-build-push
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [vulkan, cuda]
        backend:
          # Upstream llama.cpp -> plain variant tags (vulkan, cuda).
          - image_repo: ghcr.io/ggml-org/llama.cpp
            tag_suffix: ''
          # beellama fork -> suffixed tags (vulkan-beellama, cuda-beellama).
          - image_repo: ghcr.io/anbeeld/beellama.cpp
            tag_suffix: -beellama

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.variant }}${{ matrix.backend.tag_suffix }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            LLAMA_IMAGE=${{ matrix.backend.image_repo }}:server-${{ matrix.variant }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
