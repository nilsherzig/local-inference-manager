manager:
  listen: "0.0.0.0:8080"
  db_path: "./lim.db"
  default_ttl: 300 # idle seconds before an instance is stopped
  health_timeout: 300 # max seconds to wait for /health (cold start + model download)
  log_requests_body: true # store request/response bodies (grows the DB)

# Each model carries its own full llama-server command line. There are no macros:
# to add a model, copy a whole block and edit it. ${PORT} is the only
# substitution — the manager assigns a free port per instance.
models:
  gemma-4-e4b:
    cmd: |
      /app/llama-server
      --cache-reuse 256
      --cache-type-k q8_0
      --cache-type-v q8_0
      --ctx-size 90000
      --host 127.0.0.1
      --jinja
      --metrics
      --no-mmap
      --port ${PORT}
      --ui-mcp-proxy
      -fa on
      -hf unsloth/gemma-4-E4B-it-qat-GGUF:UD-Q4_K_XL
      -ngl 99
    ttl: 300
    aliases:
      - gemma
      - gemma-4
      - gemma-4-e4b-it

  qwen3.6-27b:
    cmd: |
      /app/llama-server
      --host 127.0.0.1
      --port ${PORT}
      -ngl 99
      --jinja
      --metrics
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --cache-reuse 256
      --kv-unified
      --no-mmap
      --no-host
      -b 2048
      -ub 512
      -hf unsloth/Qwen3.6-27B-GGUF:Q4_K_M
      --spec-type dflash
      --spec-draft-hf Anbeeld/Qwen3.6-27B-DFlash-GGUF:Q4_K_M
      --spec-draft-ngl 99
      --spec-dflash-cross-ctx 1024
      --ctx-size 131072
      --temp 0.6
      --top-k 20
      --top-p 1.0
      --min-p 0
      --reasoning on
      --chat-template-kwargs {"preserve_thinking":true}
    ttl: 300
    aliases:
      - qwen
      - qwen3.6
      - qwen3.6-27b-dflash

